name: 地质海洋招投标情报采集

on:
  schedule:
    # 每周一北京时间 8:00 运行
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: bidding-pipeline
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 恢复数据库缓存
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: data/bidding_intel.db
          key: bidding-db-${{ github.run_id }}
          restore-keys: bidding-db-

      - name: 创建目录
        run: mkdir -p data reports docs

      - name: 采集与分析（演示模式）
        id: run
        timeout-minutes: 5
        run: |
          python main.py --demo --days 7 --no-push --pages 2>&1 | tee run.log
          echo "DB_SIZE=$(du -h data/bidding_intel.db 2>/dev/null | cut -f1 || echo '0')" >> $GITHUB_OUTPUT

      - name: 保存数据库缓存
        uses: actions/cache/save@v4
        with:
          path: data/bidding_intel.db
          key: bidding-db-${{ github.run_id }}

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: 输出摘要
        run: |
          echo "========== 执行摘要 =========="
          echo "数据库大小: ${{ steps.run.outputs.DB_SIZE }}"
          echo "报告地址: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          grep -E "(新增|总计|报告已保存)" run.log || true
          echo "================================"

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
